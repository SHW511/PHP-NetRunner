name: Replace Repo Content

on:
  workflow_dispatch:

jobs:
  replace-content:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout current repository
      uses: actions/checkout@v2

    - name: Clone target repository to temp directory
      run: |
        git clone --depth 1 https://SvenWind97@dev.azure.com/SvenWind97/PHP%20NetRunner/_git/PNetRunner temp-repo --no-tags

    - name: Remove existing content except.github/workflows
      run: |
        find . -not -path "./.github/workflows" -prune -o -exec rm -rf {} +

    - name: Copy new content, excluding.github/workflows
      run: |
        rsync -a --exclude='.github/workflows' temp-repo/.

    - name: Remove azure-pipelines.yaml files from temp-repo
      run: |
        rm -f temp-repo/*.yaml
        rm -f temp-repo/*-1.yaml
        
    - name: Configure GitHub authentication
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'SvenWind97@gmail.com'
        git remote remove origin
        git remote add origin https://github.com/SHW511/PHP-NetRunner.git

    - name: Commit and push changes
      run: |
        git add .
        git commit -m "Replace repository content with new content"
        git push https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/SHW511/PHP-NetRunner.git master --force
